name: Run Tests

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Step 1: checkout
      # Step 2: set up Python 3.11
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Step 3: install pytest, pytest-cov, flake8
      - name: Install dependencies
        run: pip install pytest pytest-cov flake8
      # Step 4: run pytest with coverage enforcement
      - name: run pytest
        run: pytest --cov=. --cov-fail-under=85
      # Step 5: run flake8
      - name: run flake8
        run: flake8 .
